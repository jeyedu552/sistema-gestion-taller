name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Typecheck
        run: pnpm run build

  cd:
    name: Continuous Deployment (Docker Hub)
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # === BUILD AND PUSH MICROSERVICES ===

      - name: Build and Push MS-Auth
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.microservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sistema-gestion-taller-ms-auth:latest
          build-args: |
            APP_NAME=@taller/ms-auth

      - name: Build and Push MS-Operaciones
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.microservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sistema-gestion-taller-ms-operaciones:latest
          build-args: |
            APP_NAME=@taller/ms-operaciones

      - name: Build and Push MS-Chat
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.microservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sistema-gestion-taller-ms-chat:latest
          build-args: |
            APP_NAME=@taller/ms-chat

      - name: Build and Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.microservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sistema-gestion-taller-api-gateway:latest
          build-args: |
            APP_NAME=@taller/api-gateway

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.microservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sistema-gestion-taller-frontend:latest
          build-args: |
            APP_NAME=@taller/frontend
            NEXT_PUBLIC_API_URL=http://localhost:8080
            NEXT_PUBLIC_SOCKET_URL=http://localhost:3003
