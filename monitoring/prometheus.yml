global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'ms-auth'
    static_configs:
      - targets: ['ms-auth:3001']
  - job_name: 'ms-operaciones'
    static_configs:
      - targets: ['ms-operaciones:3002']
  - job_name: 'ms-chat'
    static_configs:
      - targets: ['ms-chat:3003']
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']
